version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env
        - echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env.production
        - npm install
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
